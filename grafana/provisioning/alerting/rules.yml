apiVersion: 1

groups:
  - orgId: 1
    name: host-alerts
    folder: Infrastruktur
    interval: 1m
    rules:
      - uid: cpu-busy-85-alert
        title: "CPU Busy > 85%"
        condition: B
        for: 5m
        noDataState: NoData
        execErrState: Error
        isPaused: false
        annotations:
          summary: "CPU-Auslastung auf {{ $labels.instance }} bei {{ $values.A.Value | printf \"%.1f\" }}%"
          cpu_value: "{{ $values.A.Value | printf \"%.1f\" }}%"
        labels: {}
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: t4f0shgRk
            model:
              editorMode: code
              expr: >
                (
                  sum by(instance) (irate(node_cpu_seconds_total{mode!="idle"}[5m]))
                  / on(instance) group_left()
                  sum by(instance) (irate(node_cpu_seconds_total{}[5m]))
                ) * 100
              interval: ""
              legendFormat: "{{instance}}"
              range: true
              refId: A

          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: "-100"  # Grafana built-in expression datasource
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 85
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                    params: []