apiVersion: 1
 
templates:
  - orgId: 1
    name: ntfy
    template: |
      {{ define "ntfy.message" -}}
      {{ if eq .Status "firing" -}}
      🔴 ALARM aktiv
      {{ else -}}
      ✅ Wieder normal
      {{ end -}}
      Instanz:  {{ (index .Alerts 0).Labels.instance }}
      CPU-Last: {{ (index .Alerts 0).Annotations.cpu_value }}
      Seit:     {{ (index .Alerts 0).StartsAt | date "02.01.2006 15:04" }} Uhr
      {{- end }}
